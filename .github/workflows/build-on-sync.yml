name: Build on Sync

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      create_release:
        description: '创建 GitHub Release'
        required: false
        type: boolean
        default: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    
    env:
      CI: false
      # 注意：如需启用自动更新签名，请在仓库 Secrets 中配置 TAURI_PRIVATE_KEY 和 TAURI_KEY_PASSWORD
      # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # 直接使用 package.json 中的版本号，不再追加编号后缀
          GIT_HASH=$(git rev-parse --short HEAD)
          GIT_DESC="v${VERSION}-${GIT_HASH}"
          # GitHub Actions 运行在 UTC 环境，手动加 8 小时
          BUILD_TIME=$(date -u -d '+8 hours' +'%Y-%m-%d %H:%M:%S UTC+8')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_desc=$GIT_DESC" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "file_prefix=EcoPaste_${VERSION}" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows app (x64)
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Rename artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe "dist/${{ steps.version.outputs.file_prefix }}_x64-setup.exe"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: dist/*.exe
          retention-days: 7
          compression-level: 0

      - name: Create Release
        if: github.event.inputs.create_release != 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "EcoPaste_v${{ steps.version.outputs.version }}"
          body: |
            ## EcoPaste-Pro 增强版
            
            基于官方 EcoPaste 的增强 Fork 版本，包含以下改进：
            
            ### ✨ Pro.5.3
            #### ✨ 新增功能
            - 🚀 纯文本粘贴升级为全局快捷键，后台粘贴最新内容、前台粘贴选中内容
            
            #### 💫 体验优化
            - 📊 优化内容与表格数据识别，修复表格误判问题，自动清理临时残留文件
            - 🔘 优化默认快捷按钮配置与排序，提升上手体验
            - 🖱️ 更名并调整「划词粘贴」设置位置，操作更直观
            - 📊 优化存储统计页面布局，扩大图表展示空间
            
            #### 🐞 bug 修复
            - ⌨️ 修复快捷键粘贴无响应、失效问题
            - 📈⏰ 修复统计图表、时间选择器的窗口布局异常问题

            ### 📜 Pro.5.2
            #### ✨ 新增功能
            - 📦 支持按范围 + 内容类型筛选导出数据，备份可直接兼容导入
            - 🏷️ 统一备份文件命名规则，支持 4 种备份模式，管理更清晰
            - 📥 支持拖拽导入备份文件，导入后自动刷新数据
            - ⌨️ 新增双击 Ctrl/Alt/Shift 快速打开剪贴板窗口
            
            #### 💫 体验优化
            - ✂️ 自动剔除复制内容首尾多余空格，类型识别更准确
            - 🎨 升级代码高亮，贴近 VS Code 配色，阅读更清晰
            - 🔄 备份导入 / 恢复无需重启应用，数据无感刷新
            - 🛡️ 过滤无效 “假复制” 提示，剪贴板监听更精准
            - 📊 优化表格、HTML 内容展示，排版更整洁紧凑
            - 🔒 修复粘贴时篡改历史记录来源的问题
            
            #### 🐞 bug 修复
            - 📧 修复邮箱分组显示空白的问题
            - 📌 修复置顶窗口粘贴后异常关闭的问题

            ### 📜 M05.1
            - **📊 全景图表视界**
              - 📋 新增 12 类内容存储统计面板，支持「全部 / 收藏」分类查看
              - ⚡ 重构统计算法，移除阻塞 IO，实现海量数据瞬时加载
              - 📈 新增视觉平衡算法，避免小体积数据展示 “隐身”
              - 🎯 悬停即可查看对应类型条目数与体积
            - **⏳ 灵活的时间线流转**
              - ⏰ 支持多时间维度筛选，可自定义日期范围
              - 🔗 时间筛选与图表、列表实时联动
            - **🧹 防误删的智能大扫除**
              - 🗑️ 支持按类型批量清理未收藏冗余数据
              - 🖼️ 图片清理可同步删除本地文件，释放磁盘空间
            - **🐞 Bug 修复**
              - 🌐 修复网页链接复制时被误判为 HTML 的问题
              - 🎨 修复普通英文单词被误识为颜色代码的问题
            - **🐛 原版缺陷修复**
              - 📂 修复文件图标默认存入 AppData 的问题，精准保存至自定义路径

            ### 📜 M05.0
            - **📅 多维组合筛选**：新增「日期 + 内容类型」复合筛选，支持按日/按月/自定义范围及 12 种内容类型标签多选
            - **🧩 代码 (SVG) 智能识别**：新增 SVG 格式化内容双重校验识别，归类为 `代码 (SVG)` 标签
            - **📌 详情级全局 Tooltip**：悬停条目头部即可追溯来源、类型、字符数、时间等全量核心属性
            - **📝 精准时间自适应显示**：相对时间超 3 天自动切换 `YY/M/D H:mm` 绝对时间格式
            - **🧹 顶部控件布局重组**：收窄搜索框，前置整合置顶/设置等高频操作按钮
            - **🏗️ 焦点管理全链路回退**：不夺焦窗口与光标跟随实现回退至原版 v0.6.0-beta.3
            - **🐞 多项误判修复**：修复激活时分组切换失效、复合型/HTML/Markdown/JavaScript 代码误判等多项 Bug
            - **👁️️ 条目头部全宽释放**：取消原版隐形按钮预留宽度，未选中状态头部 100% 全宽显示
            
            ### 🕒 过往版本核心特性归纳
            - 向下兼容架构加固（DB 查询防护 + 配置深拷贝）、分组切换竞态条件修复，来源应用信息修正 (M04.5/M04.6)
            - 支持文本片段选取与浮动工具栏快速操作，独立开关控制 (M04.4)
            - CMYK 颜色识别，右键菜单按 12 种内容类型专属定制重构 (M04.3)
            - Windows 路径与指令智能识别一键打开，配置文件自动同步 (M04.2)
            - WebDAV 备份调度引擎（定时/间隔/Cron），Markdown 智能识别与沉浸编辑，图片目录定位 (M04.1)
            - 支持基于 WebDAV 的云备份与恢复，且各项敏感核心配置均已对接 Windows 系统底层自带的凭据管理器安全护航 (M03)，并提供图片可选不清理本地原文件的独立管理 (M03)
            - "链接""颜色""代码"原生命中群组分类提取，以及原始应用图标来源追溯 (M02)
            - 富文本与图片的大弹窗沉浸独立编辑框，并配有媲美 IDE 的代码片段语法高亮全彩识别 (M02)
            - 主程序支持不夺焦静默纯后台呼出、贴图自动跟随输入光标，列表项行高及长文图片跨滚动折叠状态记录 (M01/M02)
            - 强力接管解决原版官方核心无法向系统任何自定义路径成功存盘截屏图片的致命红叉 Bug (M01)
            
            ### 📋 版本信息
            - **版本**: ${{ steps.version.outputs.version }}
            - **构建时间**: ${{ steps.version.outputs.build_time }}
            - **Git 描述**: ${{ steps.version.outputs.git_desc }}
            
            ### ⚠️ 注意事项
            - 此版本禁用了自动更新功能，避免与官方版本冲突
            - 配置文件与官方版本兼容，可直接替换使用
          draft: false
          prerelease: true
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
